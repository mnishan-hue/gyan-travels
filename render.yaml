services:
  - type: web
    name: gyan-travels-api
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: GMAIL_USER
        value: hellogyantravels@gmail.com
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
